[variables]
PYTHON_VERSION = '3.11'

[phases.build]
cmds = [
    'chmod +x start.sh',
    'python -c "import urllib.request; urllib.request.urlretrieve(\"https://github.com/xssnick/tonutils-storage/releases/latest/download/tonutils-storage-linux-amd64\", \"tonutils-storage\")" && chmod +x tonutils-storage || echo "[build] tonutils-storage download failed"',
]
